// A rectangle as defined by x, y coordinates and width, height
message Rectangle
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
  float x = 0
  float y = 0
  float w = 0
  float h = 0
 }
// A ROI (Region Of Interest). Collection of shapes and an image to which they are applied
message Roi
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
 repeated  point points = 0
 repeated  line lines = 0
 repeated  rectangle rectangles = 0
 repeated  ellipse ellipses = 0
 repeated  polygon polygons = 0
 repeated  mask masks = 0
 }
// A series whose values represent time
message TimeSeries
 {
 repeated  float timePointsSec = 0
 }
// A non-standardized microscope sample produced during regular operation of a research project.
message UserExperiment
 {
  string name = 0
  string description = 0
  protocol preparationProtocol = 0
  datetime preparationDatetime = 0
  string manufacturer = 0
 }
// A dataset of non-standardized microscope samples produced during regular operation of a research project.
message UserExperimentDataset
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  microscope microscope = 0
  experimenter experimenter = 0
  protocol acquisitionProtocol = 0
  boolean processed = 0
  userExperimentInputData inputData = 0
  userExperimentInputParameters inputParameters = 0
  userExperimentOutput output = 0
  userExperiment sample = 0
 }
message UserExperimentInputData
 {
 repeated  image userExperimentImages = 0
 repeated  roi orthogonalRois = 0
 repeated  roi profileRois = 0
 }
message UserExperimentInputParameters
 {
  integer bitDepth = 0
  float saturationThreshold = 0
 }
message UserExperimentKeyMeasurement
 {
  string channelName = 0
  integer channelNr = 0
  float variationCoefficient = 0
  integer saturatedChannels = 0
 }
message UserExperimentOutput
 {
  comment comment = 0
 repeated  string processingApplication = 0
 repeated  string processingVersion = 0
 repeated  string processingEntity = 0
  datetime processingDatetime = 0
  string processingLog = 0
 repeated  string warnings = 0
 repeated  string errors = 0
  boolean validated = 0
  datetime validationDatetime = 0
 repeated  table intensityProfiles = 0
 repeated  orthogonalImage orthogonalImages = 0
 repeated  image fftImages = 0
 repeated  userExperimentKeyMeasurement keyMeasurements = 0
 }
// A vertex as defined by x and y coordinates
message Vertex
 {
  float x = 0
  float y = 0
 }

 syntax="proto3";
 package
// metamodel_version: 1.7.0
// A image channel
message Channel
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  float excitationWavelengthNm = 0
  float emissionWavelengthNm = 0
 }
// A series representing channels
message ChannelSeries
 {
 repeated  channel channels = 0
 }
// A color as defined by RGB values and an optional alpha value
message Color
 {
  integer r = 0
  integer g = 0
  integer b = 0
  integer alpha = 0
 }
// Attributes of a column
message Column
 {
  string name = 0
  string description = 0
  dataReference sourceReference = 0
  string dataType = 0
 repeated  string values = 0
 }
// A comment
message Comment
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime datetime = 0
  experimenter author = 0
  commentTypesEnum commentType = 0
  string text = 0
 }
// A reference to a data resource
message DataReference
 {
  string dataUri = 0
  string omeroHost = 0
  integer omeroPort = 0
  oMEROObjectTypeEnum omeroObjectType = 0
  integer omeroObjectId = 0
 }
// An ellipse as defined by x, y coordinates and x and y radii
message Ellipse
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
  float x = 0
  float y = 0
  float w = 0
  float h = 0
 }
// The person that performed the experiment or developed the protocol
message Experimenter
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  string orcid = 0
 }
// A field illumination dataset
message FieldIlluminationDataset
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  microscope microscope = 0
  experimenter experimenter = 0
  protocol acquisitionProtocol = 0
  boolean processed = 0
  fieldIlluminationInputData inputData = 0
  fieldIlluminationInputParameters inputParameters = 0
  fieldIlluminationOutput output = 0
  homogeneousField sample = 0
 }
message FieldIlluminationInputData
 {
 repeated  image fieldIlluminationImages = 0
 }
message FieldIlluminationInputParameters
 {
  integer bitDepth = 0
  float saturationThreshold = 0
  float cornerFraction = 0
  float sigma = 0
 }
message FieldIlluminationKeyMeasurement
 {
  string imageName = 0
  string imageId = 0
  string channelName = 0
  integer channelNr = 0
  string channelId = 0
  float centerRegionIntensityFraction = 0
  float centerRegionAreaFraction = 0
  float centerOfMassY = 0
  float centerOfMassYRelative = 0
  float centerOfMassX = 0
  float centerOfMassXRelative = 0
  float centerOfMassDistanceRelative = 0
  float centerGeometricY = 0
  float centerGeometricYRelative = 0
  float centerGeometricX = 0
  float centerGeometricXRelative = 0
  float centerGeometricDistanceRelative = 0
  float centerFittedY = 0
  float centerFittedYRelative = 0
  float centerFittedX = 0
  float centerFittedXRelative = 0
  float centerFittedDistanceRelative = 0
  float maxIntensity = 0
  float maxIntensityPosY = 0
  float maxIntensityPosYRelative = 0
  float maxIntensityPosX = 0
  float maxIntensityPosXRelative = 0
  float maxIntensityDistanceRelative = 0
  float topLeftIntensityMean = 0
  float topLeftIntensityRatio = 0
  float topCenterIntensityMean = 0
  float topCenterIntensityRatio = 0
  float topRightIntensityMean = 0
  float topRightIntensityRatio = 0
  float middleLeftIntensityMean = 0
  float middleLeftIntensityRatio = 0
  float middleCenterIntensityMean = 0
  float middleCenterIntensityRatio = 0
  float middleRightIntensityMean = 0
  float middleRightIntensityRatio = 0
  float bottomLeftIntensityMean = 0
  float bottomLeftIntensityRatio = 0
  float bottomCenterIntensityMean = 0
  float bottomCenterIntensityRatio = 0
  float bottomRightIntensityMean = 0
  float bottomRightIntensityRatio = 0
 }
message FieldIlluminationOutput
 {
  comment comment = 0
 repeated  string processingApplication = 0
 repeated  string processingVersion = 0
 repeated  string processingEntity = 0
  datetime processingDatetime = 0
  string processingLog = 0
 repeated  string warnings = 0
 repeated  string errors = 0
  boolean validated = 0
  datetime validationDatetime = 0
 repeated  table intensityProfiles = 0
 repeated  roi roiProfiles = 0
 repeated  roi roiCorners = 0
 repeated  roi roiCentersOfMass = 0
 repeated  roi roiCentersGeometric = 0
 repeated  roi roiCentersFitted = 0
 repeated  roi roiCentersMaxIntensity = 0
 repeated  roi roiCenterRegion = 0
 repeated  fieldIlluminationKeyMeasurement keyMeasurements = 0
 }
// An homogeneous field with a fluorescent thick sample. Similar to the Chroma slides.
message FluorescentHomogeneousThickField
 {
  string name = 0
  string description = 0
  protocol preparationProtocol = 0
  datetime preparationDatetime = 0
  string manufacturer = 0
 }
// An homogeneous field with a fluorescent thin sample. Similar to a dye thin layer.
message FluorescentHomogeneousThinField
 {
  string name = 0
  string description = 0
  protocol preparationProtocol = 0
  datetime preparationDatetime = 0
  string manufacturer = 0
 }
// A collection of harmonized microscope-metrics datasets. All of the datasets  in the collection share the same analysis and processing parameters.
message HarmonizedMetricsDatasetCollection
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
 repeated  metricsDataset datasetCollection = 0
  string datasetClass = 0
 }
// A microscope-metrics image
message Image
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  float voxelSizeXMicron = 0
  float voxelSizeYMicron = 0
  float voxelSizeZMicron = 0
  integer shapeX = 0
  integer shapeY = 0
  integer shapeZ = 0
  integer shapeC = 0
  integer shapeT = 0
  timeSeries timeSeries = 0
  channelSeries channelSeries = 0
 repeated  dataReference sourceImages = 0
  metaObject arrayData = 0
 }
// A mask image. Either a binary image or a label image
message ImageMask
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  float voxelSizeXMicron = 0
  float voxelSizeYMicron = 0
  float voxelSizeZMicron = 0
  integer shapeX = 0
  integer shapeY = 0
  integer shapeZ = 0
  integer shapeC = 0
  integer shapeT = 0
  timeSeries timeSeries = 0
  channelSeries channelSeries = 0
 repeated  dataReference sourceImages = 0
  metaObject arrayData = 0
 }
// A light source.
message LightSource
 {
  string description = 0
  float wavelengthNm = 0
  string name = 0
 }
// A sample providing measurements on light source power.
message LightSourcePower
 {
  string name = 0
  string description = 0
  protocol preparationProtocol = 0
  datetime preparationDatetime = 0
  string manufacturer = 0
 }
// Power measurements dataset. A collection of power measurements.
message LightSourcePowerDataset
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  microscope microscope = 0
  experimenter experimenter = 0
  protocol acquisitionProtocol = 0
  boolean processed = 0
  lightSourcePowerInputData inputData = 0
  lightSourcePowerInputParameters inputParameters = 0
  lightSourcePowerOutput output = 0
 }
message LightSourcePowerInputData
 {
 repeated  powerMeasurement powerMeasurements = 0
 }
message LightSourcePowerInputParameters
 {
  integer linearityRequiredMeasurements = 0
  float shortTermStabilityMeasurementIntervalSeconds = 0
  integer shortTermStabilityRequiredMeasurements = 0
  float shortTermStabilityRequiredIntegrationTimeSeconds = 0
  float longTermStabilityMeasurementIntervalSeconds = 0
  integer longTermStabilityRequiredMeasurements = 0
  float longTermStabilityRequiredIntegrationTimeSeconds = 0
 }
message LightSourcePowerKeyMeasurement
 {
  lightSource lightSource = 0
  powerMeter powerMeter = 0
  measuringLocationEnum measuringLocation = 0
  integer nrOfMeasurements = 0
  float powerMeanMw = 0
  float powerMedianMw = 0
  float powerStdMw = 0
  float powerMinMw = 0
  float powerMaxMw = 0
  datetime powerLinearityStartDatetime = 0
  datetime powerLinearityEndDatetime = 0
  float powerLinearitySlope = 0
  float powerLinearityIntercept = 0
  float powerLinearityCoefficientOfDetermination = 0
  float powerLinearityPValue = 0
  float powerLinearityStdErr = 0
  datetime shortTermPowerStabilityStartDatetime = 0
  datetime shortTermPowerStabilityEndDatetime = 0
  float shortTermPowerStability = 0
  datetime longTermPowerStabilityStartDatetime = 0
  datetime longTermPowerStabilityEndDatetime = 0
  float longTermPowerStability = 0
 }
message LightSourcePowerOutput
 {
  comment comment = 0
 repeated  string processingApplication = 0
 repeated  string processingVersion = 0
 repeated  string processingEntity = 0
  datetime processingDatetime = 0
  string processingLog = 0
 repeated  string warnings = 0
 repeated  string errors = 0
  boolean validated = 0
  datetime validationDatetime = 0
 repeated  lightSourcePowerKeyMeasurement keyMeasurements = 0
 }
// A line as defined by x1, y1, x2, y2 coordinates
message Line
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
  float x1 = 0
  float y1 = 0
  float x2 = 0
  float y2 = 0
 }
// A mask as defined by a boolean image
message Mask
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
  float x = 0
  float y = 0
  imageMask mask = 0
 }
// A collection of microscope-metrics datasets
message MetricsDatasetCollection
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
 repeated  metricsDataset datasetCollection = 0
 }
// A microscope
message Microscope
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  microscopeTypeEnum microscopeType = 0
  string manufacturer = 0
  string model = 0
  string serialNumber = 0
 repeated  comment commentCollection = 0
 }
// A collection of microscopes
message MicroscopeCollection
 {
 repeated  microscope microscopeCollection = 0
 }
// An image that is orthogonal to the main image
message OrthogonalImage
 {
  string name = 0
  string description = 0
  dataReference dataReference = 0
 repeated  dataReference linkedReferences = 0
  datetime acquisitionDatetime = 0
  float voxelSizeXMicron = 0
  float voxelSizeYMicron = 0
  float voxelSizeZMicron = 0
  integer shapeX = 0
  integer shapeY = 0
  integer shapeZ = 0
  integer shapeC = 0
  integer shapeT = 0
  timeSeries timeSeries = 0
  channelSeries channelSeries = 0
 repeated  dataReference sourceImages = 0
  metaObject arrayData = 0
  roi sourceRoi = 0
  planeAxisEnum axis = 0
 }
// A point as defined by x and y coordinates
message Point
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
  float x = 0
  float y = 0
 }
// A polygon as defined by a series of vertexes and a boolean to indicate if closed or not
message Polygon
 {
  string name = 0
  string description = 0
  float z = 0
  integer c = 0
  integer t = 0
  color fillColor = 0
  color strokeColor = 0
  integer strokeWidth = 0
 repeated  vertex vertexes = 0
  boolean isOpen = 0
 }
// A single power measurement for a light source.
message PowerMeasurement
 {
  datetime acquisitionDatetime = 0
  lightSource lightSource = 0
  powerMeter powerMeter = 0
  measuringLocationEnum measuringLocation = 0
  float powerSetPoint = 0
  float powerMw = 0
  float integrationTimeSeconds = 0
 }
message PowerMeter
 {
  string description = 0
  string manufacturer = 0
  string model = 0
  string name = 0
 }
// Set of instructions for preparing a sample or acquiring data
message Protocol
 {
  string name = 0
  string description = 0
  string version = 0
 repeated  experimenter authors = 0
  string url = 0
 }
// A sample of sub-resolution sized beads used to measure the PSF of a microscope.
message PSFBeads
 {
  string name = 0
  string description = 0
  protocol preparationProtocol = 0
  datetime preparationDatetime = 0
  string manufacturer = 0
  float beadDiameterMicron = 0
 }

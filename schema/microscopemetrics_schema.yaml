    permissible_values:
      IMAGE:
        text: IMAGE
        description: An image
      CHANNEL:
        text: CHANNEL
        description: A channel
      DATASET:
        text: DATASET
        description: A dataset
      PROJECT:
        text: PROJECT
        description: A project
      EXPERIMENTERGROUP:
        text: EXPERIMENTERGROUP
        description: A group
      EXPERIMENTER:
        text: EXPERIMENTER
        description: An experimenter
      TABLE:
        text: TABLE
        description: A table
      KEY_VALUES:
        text: KEY_VALUES
        description: A set of key-value pairs
      TAG:
        text: TAG
        description: A tag
      COMMENT:
        text: COMMENT
        description: A comment
      ROI:
        text: ROI
        description: A region of interest
      FILEANNOTATION:
        text: FILEANNOTATION
        description: A file
  MeasuringLocationEnum:
    name: MeasuringLocationEnum

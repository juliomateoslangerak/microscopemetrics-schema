see_also:
- https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema
id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema
imports:
- linkml:types
- core
- analyses/field_illumination
- analyses/psf_beads
- analyses/light_source_power
- analyses/user_experiment
- samples/homogeneous_field
- samples/beads
- samples/light_source_power
- samples/user_sample
- core
- samples/homogeneous_field
- core
- samples/beads
- core
- core
- samples/user_sample
- core
- core
- core

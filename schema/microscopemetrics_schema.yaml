      roi_centers_of_mass:
        name: roi_centers_of_mass
        description: Point ROIs marking the center of mass of the area of maximum
          illumination. When the image is very flat, the 99 percentile is used instead.
          One point per channel.
        range: Roi
        multivalued: true
      roi_centers_geometric:

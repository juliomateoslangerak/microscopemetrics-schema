        multivalued: true
        inlined: true
        inlined_as_list: true
      considered_bead_centers_lateral_edge:
        name: considered_bead_centers_lateral_edge
        description: The centers of the beads detected but considered as too close
          to the edge of the image. Measurements on these bead not considered for
          the dataset analysis. One point will be provided per bead. One ROI per channel.
        range: Roi
        multivalued: true
        inlined: true
        inlined_as_list: true
      considered_bead_centers_self_proximity:
        name: considered_bead_centers_self_proximity
        description: The centers of the beads detected but considered as too close
          to another bead. Measurements on these bead not considered for the dataset
          analysis. One point will be provided per bead. One ROI per channel.
        range: Roi
        multivalued: true
        inlined: true
        inlined_as_list: true

id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema/samples/beads
name: beads
prefixes:
#  metrics: https://github.com/MontpellierRessourcesImagerie/microscope-metrics/blob/main/src/microscopemetrics/model/
#imports:
#  - metrics:types
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
  - ../core

default_range: string


classes:
  FLuorescentBeads:
    is_a: Sample
    description: A sample of fluorescent beads.
    abstract: true
    attributes:
      bead_diameter_micron:
        description: The diameter of the beads in the sample measured in microns.
        required: true
        range: float
      excitation_wavelengths_nm:
        description: The excitation wavelength of the beads.
        required: true
        range: float
        multivalued: true
      emission_wavelengths_nm:
        description: The emission wavelength of the beads.
        required: true
        range: float
        multivalued: true

  MultiWavelengthBeads:
    is_a: FLuorescentBeads
    description: A sample of beads fluorescent in different wavelengths.

  PSFBeads:
    is_a: FLuorescentBeads
    description: A sample of beads with subresolution size used for PSF estimation.

  NonPSFBeads:
    is_a: FLuorescentBeads
    description: A sample of beads without subresolution size.


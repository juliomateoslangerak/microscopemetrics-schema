id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema/analyses/coregistration
name: coregistration
prefixes:
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
  - ../core
  - ../samples/beads

default_range: string


classes:
  CoRegistrationDataset:
    is_a: MetricsDataset
    description: >-
      A dataset containing the results of the coregistration analysis.
    mixins:
      - HasSampleMixin
      - HasInputParametersMixin
    slot_usage:
      input_data:
        range: CoRegistrationInputData
      input_parameters:
        range: CoRegistrationInputParameters
      output:
        range: CoRegistrationOutput
      sample:
        range: MultiWavelengthBeads

  CoRegistrationInputData:
    is_a: MetricsInputData
    slots:
      - multiwavelength_beads_images

  CoRegistrationInputParameters:
    is_a: MetricsInputParameters
    slots:
      - reference_channel_nr
      - bit_depth
      - saturation_threshold
      - sigma_min
      - sigma_max
      - snr_threshold

  CoRegistrationOutput:
    is_a: MetricsOutput
    attributes:
    slots:
      - analyzed_bead_centers
      - considered_bead_centers_lateral_edge
      - considered_bead_centers_self_proximity
      - considered_bead_centers_axial_edge
      - bead_properties
      - image_properties
    slot_usage:
      key_measurements:
        range: CoRegistrationKeyMeasurement

  CoRegistrationKeyMeasurement:
    is_a: KeyMeasurement
    slots:
      - reference_channel_name
      - reference_channel_nr
      - moving_channel_name
      - moving_channel_nr
      - total_bead_count
      - considered_valid_count
      - considered_self_proximity_count
      - considered_lateral_edge_count
      - considered_axial_edge_count
      - translation_x_mean
      - translation_y_mean
      - translation_z_mean
      - rotation_z_mean


slots:
  # Inputs
  multiwavelength_beads_images:
    range: Image
    description: >-
      The image containing the beads Images. At least two channels are required.
      More than one image can be provided if the image conditions are the same.
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true
  reference_channel_nr:
    range: integer
    description: >-
      The channel number of the reference channel. This channel will be used to
      detect the beads and to align the images to.
    required: true
    multivalued: false
    ifabsent: integer(0)

  # Outputs
  reference_channel_name:
    range: string
    description: >-
      The name of the reference channel.
    multivalued: false
  moving_channel_name:
    range: string
    description: >-
      The name of the channel which is being registered to the reference channel.
    multivalued: false
  moving_channel_nr:
    range: integer
    description: >-
      The number of the channel which is being registered to the reference channel.

  translation_x_mean:
    range: float
    description: >-
      The mean translation in the x direction.
    multivalued: false
  translation_y_mean:
    range: float
    description: >-
      The mean translation in the y direction.
    multivalued: false
  translation_z_mean:
    range: float
    description: >-
      The mean translation in the z direction.
    multivalued: false
  rotation_z_mean:
    range: float
    description: >-
      The mean rotation around the z axis in degrees.
    multivalued: false


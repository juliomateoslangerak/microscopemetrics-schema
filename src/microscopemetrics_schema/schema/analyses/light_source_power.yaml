id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema/analyses/light_source_power
name: light_source_power
prefixes:
#  metrics: https://github.com/MontpellierRessourcesImagerie/microscope-metrics/blob/main/src/microscopemetrics/model/
#imports:
#  - metrics:types
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
  - ../core

default_range: string


classes:
  LightSourcePowerDataset:
    is_a: MetricsDataset
    description: >-
      Power measurements dataset. A collection of power measurements.
    slot_usage:
      input_data:
        range: LightSourcePowerInputData
      input_parameters:
        range: LightSourcePowerInputParameters
      output:
        range: LightSourcePowerOutput

  LightSourcePowerInputData:
    is_a: MetricsInputData
    slots:
      - power_measurements

  LightSourcePowerInputParameters:
    is_a: MetricsInputParameters
    slots:
      - linearity_required_measurements
      - short_term_stability_measurement_interval_seconds
      - short_term_stability_required_measurements
      - short_term_stability_required_integration_time_seconds
      - long_term_stability_measurement_interval_seconds
      - long_term_stability_required_measurements
      - long_term_stability_required_integration_time_seconds

  LightSourcePowerOutput:
    is_a: MetricsOutput
    slot_usage:
      key_measurements:
        range: LightSourcePowerKeyMeasurement


  LightSourcePowerKeyMeasurement:
    is_a: KeyMeasurement
    slots:
      - light_source
      - power_meter
      - measuring_location
      - nr_of_measurements
      - power_mean_mw
      - power_median_mw
      - power_std_mw
      - power_min_mw
      - power_max_mw
      - power_linearity_start_datetime
      - power_linearity_end_datetime
      - power_linearity_slope
      - power_linearity_intercept
      - power_linearity_coefficient_of_determination
      - power_linearity_p_value
      - power_linearity_std_err
      - short_term_power_stability_start_datetime
      - short_term_power_stability_end_datetime
      - short_term_power_stability
      - long_term_power_stability_start_datetime
      - long_term_power_stability_end_datetime
      - long_term_power_stability
    slot_usage:
      light_source:
        inlined: false
      power_meter:
        inlined: false

  PowerMeasurement:
    description: >-
      A single power measurement for a light source.
    slots:
      - acquisition_datetime
      - light_source
      - power_meter
      - measuring_location
      - power_set_point
      - power_mw
      - integration_time_seconds

  LightSource:
    is_a: NamedObject
    description: >-
      A light source.
    slots:
      - wavelength_nm
    slot_usage:
      name:
        required: true
        identifier: true

  PowerMeter:
    is_a: NamedObject
    attributes:
      manufacturer:
        range: string
        multivalued: false
      model:
        range: string
        multivalued: false
    slot_usage:
      name:
        required: true
        identifier: true

slots:
  # Input data
  power_measurements:
    range: PowerMeasurement
    description: >-
      This is a collection of power measurements for different light sources.
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true

  # TODO: We have to redefine which slots are required. Change KeyMeasurement to a list ot KeyMeasurement more than a collection of lists
  light_source:
    range: LightSource
    description: >-
      The light source under investigation.
    multivalued: false
  measuring_location:
    range: MeasuringLocationEnum
    description: >-
      The location at which the measurement was taken.
    required: false
    multivalued: false
    ifabsent: MeasuringLocationEnum(OBJECTIVE_FOCAL)
  wavelength_nm:
    range: float
    description: >-
      The wavelength of the light source in nanometers.
    multivalued: false
  power_meter:
    range: PowerMeter
    description: >-
      The power meter used to measure the power.
    multivalued: false
    inlined: false
  power_set_point:
    range: float
    description: >-
      The power set point as a fraction of the nominal power of the light source.
    multivalued: false
  power_mw:
    range: float
    description: >-
      The power measured in milliwatts.
    multivalued: false
  integration_time_seconds:
    range: float
    description: >-
      The integration time in seconds.
    multivalued: false

  # Input parameters
  linearity_required_measurements:
    range: integer
    description: >-
      The minimum number of measurements required to calculate power linearity.
    multivalued: false
    required: false
    ifabsent: int(10)
  short_term_stability_measurement_interval_seconds:
    range: float
    description: >-
      The measurement interval, in seconds, used to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: float(1.0)
  short_term_stability_required_measurements:
    range: integer
    description: >-
      The minimum number of measurements required to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: int(300)
  short_term_stability_required_integration_time_seconds:
    range: float
    description: >-
      The minimum integration time, in seconds, required to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: float(0.1)
  long_term_stability_measurement_interval_seconds:
    range: float
    description: >-
      The measurement interval, in seconds, used to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: float(30.0)
  long_term_stability_required_measurements:
    range: integer
    description: >-
      The minimum number of measurements required to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: int(240)
  long_term_stability_required_integration_time_seconds:
    range: float
    description: >-
      The minimum integration time, in seconds, required to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: float(1.0)

  # Output
  nr_of_measurements:
    range: integer
    description: >-
      The number of power measurements taken.
    multivalued: false
  power_mean_mw:
    range: float
    description: >-
      The mean power measured in milliwatts.
    multivalued: false
  power_median_mw:
    range: float
    description: >-
      The median power measured in milliwatts.
    multivalued: false
  power_std_mw:
    range: float
    description: >-
      The standard deviation of the power measured in milliwatts.
    multivalued: false
  power_min_mw:
    range: float
    description: >-
      The minimum power measured in milliwatts.
    multivalued: false
  power_max_mw:
    range: float
    description: >-
      The maximum power measured in milliwatts.
    multivalued: false
  power_linearity_start_datetime:
    title: Linearity start datetime
    range: datetime
    description: >-
      The datetime of the first measurement used to calculate power linearity.
    multivalued: false
  power_linearity_end_datetime:
    title: Linearity end datetime
    range: datetime
    description: >-
      The datetime of the last measurement used to calculate power linearity.
    multivalued: false
  power_linearity_slope:
    title: Linearity slope
    range: float
    description: >-
      The slope of the linear regression model that fits output power as a function of the set point.
    multivalued: false
  power_linearity_intercept:
    title: Linearity intercept
    range: float
    description: >-
      The intercept of the linear regression model that fits output power as a function of the set point.
    multivalued: false
  power_linearity_coefficient_of_determination:
    title: Linearity coefficient of determination
    range: float
    description: >-
      The coefficient of determination a linear regression model fits output power as a function of the set point.
    multivalued: false
  power_linearity_p_value:
    title: Linearity p-value
    range: float
    description: >-
      The p-value of the linear regression model that fits output power as a function of the set point.
    multivalued: false
  power_linearity_std_err:
    title: Linearity standard error
    range: float
    description: >-
      The standard error of the linear regression model that fits output power as a function of the set point.
    multivalued: false
  short_term_power_stability_start_datetime:
    title: Short term stability start datetime
    range: datetime
    description: >-
      The datetime of the first measurement used to calculate short term power stability.
    multivalued: false
  short_term_power_stability_end_datetime:
    title: Short term stability end datetime
    range: datetime
    description: >-
      The datetime of the last measurement used to calculate short term power stability.
    multivalued: false
  short_term_power_stability:
    title: Short term stability
    range: float
    description:
      The short term stability of the light source
    multivalued: false
  long_term_power_stability_start_datetime:
    title: Long term stability start datetime
    range: datetime
    description: >-
      The datetime of the first measurement used to calculate long term power stability.
    multivalued: false
  long_term_power_stability_end_datetime:
    title: Long term stability end datetime
    range: datetime
    description: >-
      The datetime of the last measurement used to calculate long term power stability.
    multivalued: false
  long_term_power_stability:
    title: Long term stability
    range: float
    description:
      The long term stability of the light source
    multivalued: false

enums:
  MeasuringLocationEnum:
    description: >-
      The location at which the measurement was taken.
    permissible_values:
      SOURCE_EXIT:
        description: Power at the exit of the light source
      FIBER_EXIT:
        description: Power at the exit of the fiber
      OBJECTIVE_BACKFOCAL:
        description: Power at the back focal plane of the objective
      OBJECTIVE_EXIT:
        description: Power at the exit of the objective
      OBJECTIVE_FOCAL:
        description: Power at the focal plane of the objective
      OTHER:
        description: Other location

id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema/analyses/light_source_power
name: light_source_power
prefixes:
#  metrics: https://github.com/MontpellierRessourcesImagerie/microscope-metrics/blob/main/src/microscopemetrics/model/
#imports:
#  - metrics:types
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
  - ../core

default_range: string


classes:
  LightSourcePowerDataset:
    is_a: MetricsDataset
    description: >-
      Power measurements dataset. A collection of power measurements.
    slot_usage:
      input_data:
        range: LightSourcePowerInputData
      input_parameters:
        range: LightSourcePowerInputParameters
      output:
        range: LightSourcePowerOutput

  LightSourcePowerInputData:
    is_a: MetricsInputData
    slots:
      - power_measurements

  LightSourcePowerInputParameters:
    is_a: MetricsInputParameters
    slots:
      - short_term_stability_measurement_interval_seconds
      - short_term_stability_required_measurements
      - short_term_stability_required_integration_time_seconds
      - long_term_stability_measurement_interval_seconds
      - long_term_stability_required_measurements
      - long_term_stability_required_integration_time_seconds

  LightSourcePowerOutput:
    is_a: MetricsOutput
    attributes:
      key_measurements:
        range: LightSourcePowerKeyMeasurements
        description: >-
          Key-Value measurements for the power measurements.


  LightSourcePowerKeyMeasurements:
    is_a: KeyMeasurements
    slots:
      - light_source
      - measurement_device
      - measuring_location
      - nr_of_measurements
      - power_mean_mw
      - power_median_mw
      - power_std_mw
      - power_min_mw
      - power_max_mw
      - power_linearity
      - short_term_power_stability
      - long_term_power_stability
    slot_usage:
      light_source:
        multivalued: true
      measurement_device:
        multivalued: true
      measuring_location:
        multivalued: true
      nr_of_measurements:
        multivalued: true
      power_mean_mw:
        multivalued: true
      power_median_mw:
        multivalued: true
      power_std_mw:
        multivalued: true
      power_min_mw:
        multivalued: true
      power_max_mw:
        multivalued: true
      power_linearity:
        multivalued: true
      short_term_power_stability:
        multivalued: true
      long_term_power_stability:
        multivalued: true

  PowerMeasurement:
    description: >-
      A single power measurement for a light source.
    slots:
      - acquisition_datetime
      - light_source
      - measurement_device
      - measuring_location
      - power_set_point
      - power_mw
      - integration_time_seconds
    slot_usage:
      acquisition_datetime:
        required: true

  LightSource:
    is_a: NamedObject
    description: >-
      A light source.
    slots:
      - wavelength_nm

  PowerMeter:
    is_a: NamedObject
    attributes:
      manufacturer:
        range: string
        multivalued: false
      model:
        range: string
        multivalued: false

slots:
  # Input data
  power_measurements:
    range: PowerMeasurement
    description: >-
      This is a collection of power measurements for different light sources.
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true

  light_source:
    range: LightSource
    description: >-
      The light source under investigation.
    required: true
    multivalued: false
  measuring_location:
    range: MeasuringLocationEnum
    description: >-
      The location at which the measurement was taken.
    required: true
    ifabsent: MeasuringLocationEnum(OBJECTIVE_FOCAL)
    multivalued: false
  wavelength_nm:
    range: float
    description: >-
      The wavelength of the light source in nanometers.
    required: true
    multivalued: false

  measurement_device:
    range: PowerMeter
    description: >-
      The power meter used to measure the power.
    required: false
    multivalued: false
    inlined: false

  power_set_point:
    range: float
    description: >-
      The power set point as a fraction of the nominal power of the light source.
    multivalued: false
    required: true
  power_mw:
    range: float
    description: >-
      The power measured in milliwatts.
    multivalued: false
    required: true
  integration_time_seconds:
    range: float
    description: >-
      The integration time in seconds.
    multivalued: false
    required: false

  # Input parameters
  short_term_stability_measurement_interval_seconds:
    range: float
    description: >-
      The measurement interval, in seconds, used to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: float(1.0)
  short_term_stability_required_measurements:
    range: integer
    description: >-
      The minimum number of measurements required to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: int(300)
  short_term_stability_required_integration_time_seconds:
    range: float
    description: >-
      The minimum integration time, in seconds, required to calculate short term power stability.
    multivalued: false
    required: false
    ifabsent: float(0.1)
  long_term_stability_measurement_interval_seconds:
    range: float
    description: >-
      The measurement interval, in seconds, used to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: float(30.0)
  long_term_stability_required_measurements:
    range: integer
    description: >-
      The minimum number of measurements required to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: int(240)
  long_term_stability_required_integration_time_seconds:
    range: float
    description: >-
      The minimum integration time, in seconds, required to calculate long term power stability.
    multivalued: false
    required: false
    ifabsent: float(1.0)

  # Output
  nr_of_measurements:
    range: integer
    description: >-
      The number of power measurements taken.
    multivalued: false
    required: true
  power_mean_mw:
    range: float
    description: >-
      The mean power measured in milliwatts.
    multivalued: false
    required: true
  power_median_mw:
    range: float
    description: >-
      The median power measured in milliwatts.
    multivalued: false
    required: true
  power_std_mw:
    range: float
    description: >-
      The standard deviation of the power measured in milliwatts.
    multivalued: false
    required: true
  power_min_mw:
    range: float
    description: >-
      The minimum power measured in milliwatts.
    multivalued: false
    required: true
  power_max_mw:
    range: float
    description: >-
      The maximum power measured in milliwatts.
    multivalued: false
    required: true
  power_linearity:
    title: Linearity R2
    range: float
    description: >-
      The linearity of the power measurements.
    multivalued: false
    required: false
  short_term_power_stability:
    title: Short term stability
    range: float
    description:
      The short term stability of the light source
    multivalued: false
    required: false
  long_term_power_stability:
    title: Long term stability
    range: float
    description:
      The long term stability of the light source
    multivalued: false
    required: false

enums:
  MeasuringLocationEnum:
    description: >-
      The location at which the measurement was taken.
    permissible_values:
      SOURCE_EXIT:
        description: Power at the exit of the light source
      FIBER_EXIT:
        description: Power at the exit of the fiber
      OBJECTIVE_BACKFOCAL:
        description: Power at the back focal plane of the objective
      OBJECTIVE_EXIT:
        description: Power at the exit of the objective
      OBJECTIVE_FOCAL:
        description: Power at the focal plane of the objective
      OTHER:
        description: Other location

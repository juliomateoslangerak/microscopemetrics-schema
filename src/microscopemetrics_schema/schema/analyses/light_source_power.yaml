id: https://MontpellierRessourcesImagerie.github.io/microscopemetrics-schema/analyses/light_source_power
name: light_source_power
prefixes:
#  metrics: https://github.com/MontpellierRessourcesImagerie/microscope-metrics/blob/main/src/microscopemetrics/model/
#imports:
#  - metrics:types
  linkml: https://w3id.org/linkml/
imports:
  - linkml:types
  - ../core

default_range: string


classes:
  LightSourcePowerDataset:
    is_a: MetricsDataset
    description: >-
      Power measurements dataset. A collection of power measurements.
    slot_usage:
      input_data:
        range: LightSourcePowerInputData
      input_parameters:
        range: LightSourcePowerInputParameters
      output:
        range: LightSourcePowerOutput

  LightSourcePowerInputData:
    is_a: MetricsInputData
    slots:
      - power_measurements

  LightSourcePowerInputParameters:
    is_a: MetricsInputParameters
    slots:
      - short_long_term_threshold_seconds

  LightSourcePowerOutput:
    is_a: MetricsOutput
    attributes:
      key_measurements:
        range: LightSourcePowerKeyMeasurements
        description: >-
          Key-Value measurements for the power measurements.


  LightSourcePowerKeyMeasurements:
    is_a: KeyMeasurements
    slots:
      - light_source
      - measurement_device
      - power_mean_mw
      - power_median_mw
      - power_std_mw
      - power_min_mw
      - power_max_mw
      - power_linearity
      - short_term_power_stability
      - short_term_measurement_duration_seconds
      - long_term_power_stability
      - long_term_measurement_duration_seconds

  PowerMeasurement:
    description: >-
      A single power measurement for a light source.
    slots:
      - acquisition_datetime
      - light_source
      - measurement_device
      - measuring_location
      - power_set_point
      - power_mw
      - integration_time_ms
#      - irradiance???
    slot_usage:
      acquisition_datetime:
        required: true

  LightSource:
    description: >-
      A light source.
    slots:
      - wavelength_nm

  PowerMeter:
    is_a: NamedObject
    attributes:
      manufacturer:
        range: string
        multivalued: false
      model:
        range: string
        multivalued: false

slots:
  # Input data
  power_measurements:
    range: PowerMeasurement
    description: >-
      This is a collection of power measurements for different light sources.
    required: true
    multivalued: true
    inlined: true
    inlined_as_list: true

  light_source:
    range: LightSource
    description: >-
      The light source under investigation.
    required: true
    multivalued: false
  measuring_location:
    range: MeasuringLocationEnum
    description: >-
      The location at which the measurement was taken.
    required: true
    ifabsent: MeasuringLocationEnum(OBJECTIVE_FOCAL)
    multivalued: false
  wavelength_nm:
    range: float
    description: >-
      The wavelength of the light source in nanometers.
    required: true
    multivalued: false

  measurement_device:
    range: PowerMeter
    description: >-
      The power meter used to measure the power.
    required: false
    multivalued: false
    inlined: false

  power_set_point:
    range: float
    description: >-
      The power set point as a fraction of the nominal power of the light source.
    multivalued: false
    required: true
  power_mw:
    range: float
    description: >-
      The power measured in milliwatts.
    multivalued: false
    required: true
  integration_time_ms:
    range: float
    description: >-
      The integration time in milliseconds.
    multivalued: false
    required: false

  # Input parameters
  short_long_term_threshold_seconds:
    range: float
    description: >-
      The measurement interval, in seconds, that separates short and long term power stability calculations.
    multivalued: false
    required: true
    ifabsent: float(1.0)

  # Output
  power_mean_mw:
    range: float
    description: >-
      The mean power measured in milliwatts.
    multivalued: true
    required: true
  power_median_mw:
    range: float
    description: >-
      The median power measured in milliwatts.
    multivalued: true
    required: true
  power_std_mw:
    range: float
    description: >-
      The standard deviation of the power measured in milliwatts.
    multivalued: true
    required: true
  power_min_mw:
    range: float
    description: >-
      The minimum power measured in milliwatts.
    multivalued: true
    required: true
  power_max_mw:
    range: float
    description: >-
      The maximum power measured in milliwatts.
    multivalued: true
  power_linearity:
    title: Linearity R2
    range: float
    description: >-
      The linearity of the power measurements.
    multivalued: true
    required: false
  short_term_power_stability:
    title: Short term stability
    range: float
    description:
      The short term stability of the light source
    multivalued: true
    required: false
  short_term_measurement_duration_seconds:
    title: Short term measurement duration
    range: float
    description:
      The duration of the short term measurement in seconds
    multivalued: true
    required: false
  long_term_power_stability:
    title: Long term stability
    range: float
    description:
      The long term stability of the light source
    multivalued: true
    required: false
  long_term_measurement_duration_seconds:
    title: Long term measurement duration
    range: float
    description:
      The duration of the long term measurement in seconds
    multivalued: true
    required: false

enums:
  MeasuringLocationEnum:
    description: >-
      The location at which the measurement was taken.
    permissible_values:
      SOURCE_EXIT:
        description: Power at the exit of the light source
      FIBER_EXIT:
        description: Power at the exit of the fiber
      OBJECTIVE_BACKFOCAL:
        description: Power at the back focal plane of the objective
      OBJECTIVE_EXIT:
        description: Power at the exit of the objective
      OBJECTIVE_FOCAL:
        description: Power at the focal plane of the objective
      OTHER:
        description: Other location
